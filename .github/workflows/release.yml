name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.3)'
        required: true

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Determine version and prerelease flag
        id: version
        shell: bash
        run: |
          REF="${{ github.ref_name }}"
          # Support workflow_dispatch with manual tag input
          if [ -z "$REF" ] || [ "$REF" = "main" ]; then
            REF="${{ github.event.inputs.tag }}"
          fi
          VERSION="${REF#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if echo "$VERSION" | grep -qE '[-]'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "tag=$REF" >> "$GITHUB_OUTPUT"

      - name: Sync version into manifests
        shell: bash
        run: node scripts/set-version.mjs "${{ steps.version.outputs.version }}"

      - name: Extract release notes from CHANGELOG
        id: changelog
        shell: bash
        run: |
          NOTES=$(node scripts/extract-changelog.mjs "${{ steps.version.outputs.version }}")
          # GitHub Actions multiline output
          echo "notes<<CHANGELOG_EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "CHANGELOG_EOF" >> "$GITHUB_OUTPUT"

      - name: Install npm dependencies
        run: npm ci

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN_RUST }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT_REACT: ${{ vars.SENTRY_PROJECT_REACT }}
          SENTRY_PROJECT_RUST: ${{ vars.SENTRY_PROJECT_RUST }}
          SENTRY_RELEASE_VERSION: ${{ steps.version.outputs.version }}
          VITE_SENTRY_DSN: ${{ vars.VITE_SENTRY_DSN }}
          VITE_APP_CHANNEL: ${{ steps.version.outputs.prerelease == 'true' && 'canary' || 'stable' }}
        with:
          tagName: ${{ steps.version.outputs.tag }}
          releaseName: 'Transcriber v__VERSION__'
          releaseBody: ${{ steps.changelog.outputs.notes }}
          releaseDraft: true
          prerelease: ${{ steps.version.outputs.prerelease }}
          includeUpdaterJson: true
          args: ${{ steps.version.outputs.prerelease == 'true' && '--config src-tauri/tauri.canary.conf.json' || '' }}

      - name: Upload Rust debug files to Sentry
        shell: bash
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN_RUST }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT_RUST }}
          SENTRY_RELEASE: transcriber@${{ steps.version.outputs.version }}
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ] || [ -z "$SENTRY_DSN" ] || [ -z "$SENTRY_ORG" ] || [ -z "$SENTRY_PROJECT" ]; then
            echo "Sentry Rust debug files upload is skipped: configuration is incomplete."
            exit 0
          fi

          npx sentry-cli releases -o "$SENTRY_ORG" new -p "$SENTRY_PROJECT" "$SENTRY_RELEASE"

          PDB=src-tauri/target/release/transcriber.pdb
          test -f "$PDB"
          npx sentry-cli debug-files upload --include-sources "$PDB"

      - name: Publish GitHub release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ steps.version.outputs.tag }}" --draft=false

      - name: Download update manifest
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ steps.version.outputs.tag }}" \
            --pattern "latest.json" \
            --dir /tmp/updater-manifest

      - name: Publish channel manifests to GitHub Pages
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          PAGES_DIR=/tmp/pages-site

          # The version-sync and build steps leave the working tree dirty
          # (package.json, Cargo.toml, Cargo.lock, tauri.conf.json). Discard those
          # changes so switching to the gh-pages branch does not abort.
          git reset --hard HEAD

          # Fetch or create gh-pages branch
          git fetch origin gh-pages 2>/dev/null || true
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf .
          fi

          # unstable channel always gets the latest build
          cp /tmp/updater-manifest/latest.json unstable.json

          # stable channel only gets non-prerelease builds
          if [ "${{ steps.version.outputs.prerelease }}" = "false" ]; then
            cp /tmp/updater-manifest/latest.json stable.json
          fi

          rm -rf "$PAGES_DIR"
          mkdir -p "$PAGES_DIR"
          cp unstable.json "$PAGES_DIR/unstable.json"
          if [ -f stable.json ]; then
            cp stable.json "$PAGES_DIR/stable.json"
          fi
          touch "$PAGES_DIR/.nojekyll"

          git add unstable.json
          git add stable.json 2>/dev/null || true  # stable.json may not exist yet for first prerelease
          git diff --cached --quiet || git commit -m "Update channel manifests for ${{ steps.version.outputs.tag }}"
          git push origin gh-pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/pages-site

  deploy-pages:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
